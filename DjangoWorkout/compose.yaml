services:
  postgres:
    image: postgres:16-alpine
    container_name: django-workout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workout_planner}
      POSTGRES_USER: ${POSTGRES_USER:-workout_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workout_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
